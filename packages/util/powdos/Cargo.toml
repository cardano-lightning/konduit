[package]
name = "powdos"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
rust-version.workspace = true

[features]
default = ["server", "cryptoxide", "client", "problem-details"]
server = []
client = []
# Crypto features — pick at least one to get a working hash implementation.
# Typical combinations:
#   Server (native):       features = ["server", "cryptoxide"]
#   Server (any):          features = ["server", "sha2"]
#   Client (WASM):         features = ["client", "sha2"]
#   Client (native):       features = ["client", "cryptoxide"]
#   Full native (one dep): features = ["server", "client", "cryptoxide"]
#
# If both sha2 and cryptoxide are enabled, sha2 takes priority for puzzle
# hashing and HMAC. Enabling neither compiles fine but all crypto calls
# return Error::Scheme at runtime.
sha2       = ["dep:sha2"]
cryptoxide = ["dep:cryptoxide"]

# Optional integrations
problem-details = ["dep:problem-details"]

[dependencies]
serde     = { workspace= true,    features = ["derive"] }
serde_with = { workspace = true,   features = ["hex"] }
subtle.workspace = true
thiserror.workspace = true

sha2 = { workspace = true, optional = true }
cryptoxide = { workspace = true, optional = true }

problem-details = { workspace = true, optional = true }
minicbor.workspace = true
base64.workspace = true
