[package]
name = "http-client"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
http.workspace = true
minicbor = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror.workspace = true
futures.workspace = true

# ----- Transport -----
web-time = { workspace = true, optional = true }
# ---------------------

# --- WASM ----
gloo-net = { workspace = true, optional = true }
gloo-timers = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }
log = { workspace = true, optional = true }
send_wrapper = { version = "0.6.0", optional = true, features = ["futures"] }
wasm-bindgen = { workspace = true, optional = true }
wasm-bindgen-futures = { workspace = true, optional = true }
web-sys = { workspace = true, optional = true, features = ["console"] }
## FIXME :: Ought to wasm_json only. Not even needed.
serde-wasm-bindgen = { workspace = true, optional = true }
# --------------

# ---- Native -----
reqwest = { workspace = true, optional = true }
# ----------------- 

[features]
default = ["std", "json", "cbor", "wasm", "native"]
std = ["serde?/std", "serde_json?/std"]
json = ["dep:serde", "dep:serde_json", "serde/derive"]
cbor = ["dep:minicbor"]

wasm = [
  "dep:gloo-net",
  "dep:gloo-timers",
  "dep:js-sys",
  "dep:log",
  "dep:send_wrapper",
  "dep:serde-wasm-bindgen",
  "dep:wasm-bindgen",
  "dep:wasm-bindgen-futures",
  "dep:web-sys",
  "dep:web-time",
]

native = ["dep:reqwest", "dep:web-time"]

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full"] }
